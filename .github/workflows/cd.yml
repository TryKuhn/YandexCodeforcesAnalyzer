name: CD - Build and Deploy to Production

on:
  workflow_run:
    workflows: ["CI Workflow"]
    types:
      - completed

permissions:
  contents: read
  packages: write

env:
  BACKEND_IMAGE: ghcr.io/trykuhn/yandexcodeforcesanalyzer-backend
  FRONTEND_IMAGE: ghcr.io/trykuhn/yandexcodeforcesanalyzer-frontend
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

jobs:
  build-and-push:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend-prod
          cache-to: type=gha,mode=max,scope=backend-prod

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          build-args: |
            VITE_API_URL=https://createmanager.duckdns.org/api
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha,scope=frontend-prod
          cache-to: type=gha,mode=max,scope=frontend-prod

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 30m
          envs: GHCR_USERNAME,GHCR_TOKEN,IMAGE_TAG
          script: |
            set -e

            cd ~/YandexCodeforcesAnalyzer

            echo "Pulling latest compose/config changes..."
            git fetch origin main
            git reset --hard origin/main

            echo "Logging into GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            export IMAGE_TAG="$IMAGE_TAG"

            echo "Pulling new images..."
            docker compose -f docker-compose.prod.yml pull --quiet backend frontend

            echo "Restarting services..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "Cleaning dangling images..."
            docker image prune -f

            echo "Deployment completed!"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -e

            cd ~/YandexCodeforcesAnalyzer

            if command -v docker-compose >/dev/null 2>&1; then
              DC="docker-compose"
            else
              DC="docker compose"
            fi

            BACKEND_CID=$($DC -f docker-compose.prod.yml ps -q backend)

            if [ -z "$BACKEND_CID" ]; then
              echo "Backend container not found!"
              $DC -f docker-compose.prod.yml ps
              exit 1
            fi

            echo "Waiting for backend to become healthy..."
            for i in $(seq 1 36); do
              STATUS=$(docker inspect \
                --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' \
                "$BACKEND_CID")
              echo "Attempt $i/36: backend status = $STATUS"

              if [ "$STATUS" = "healthy" ]; then
                echo "Backend is healthy!"
                exit 0
              fi

              if [ "$STATUS" = "exited" ] || [ "$STATUS" = "dead" ]; then
                echo "Backend container crashed!"
                $DC -f docker-compose.prod.yml logs --tail=100 backend postgres
                exit 1
              fi

              sleep 5
            done

            echo "Backend did not become healthy after 3 minutes"
            $DC -f docker-compose.prod.yml ps
            $DC -f docker-compose.prod.yml logs --tail=100 backend postgres caddy
            exit 1