name: CD - Deploy to Production

on:
  workflow_run:
    workflows: ["CI Workflow"]
    types:
      - completed

permissions:
  contents: read

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e

            cd ~/YandexCodeforcesAnalyzer

            echo "Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main

            echo "Rebuilding containers..."
            make prod.down 2>/dev/null || echo "Nothing to stop"
            make prod.up

            echo "Cleaning up old images..."
            docker image prune -af

            echo "Deployment completed!"
            docker ps --format "table {{.Names}}\t{{.Status}}"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e

            cd ~/YandexCodeforcesAnalyzer

            if command -v docker-compose >/dev/null 2>&1; then
              DC="docker-compose"
            else
              DC="docker compose"
            fi

            echo "Checking health..."
            echo "Waiting for backend..."
            for i in $(seq 1 12); do
              if $DC -f docker-compose.prod.yml exec -T backend \
                  curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
                echo "Backend is healthy!"
                exit 0
              fi
              echo "Attempt $i/12 failed, retrying in 5s..."
              sleep 5
            done
            echo "Backend health check failed after 60s"
            exit 1