name: CI Workflow

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  backend-lint:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ./backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ruff
        run: ruff check .

      # mypy needs the whole module graph (can't lint single files correctly),
      # but it is incremental: cache .mypy_cache so only changed modules + their
      # dependents are re-analysed. Primary key always misses (run_id) so each
      # run saves a fresh cache; restore-keys pulls the most recent prior one
      # (incl. main's, which a PR inherits). Cold cache => full ~40s check;
      # warm => ~7-10s. Whole-graph correctness is preserved either way.
      - name: Restore mypy cache
        uses: actions/cache@v4
        with:
          path: ./backend/.mypy_cache
          key: mypy-${{ runner.os }}-py3.11-${{ github.run_id }}
          restore-keys: |
            mypy-${{ runner.os }}-py3.11-

      - name: Run mypy
        run: mypy . --ignore-missing-imports --explicit-package-bases

  backend-test:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      POSTGRES_DB: test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432

      SECRET_KEY: test-secret-key

      CF_CLIENT_ID: test
      CF_CLIENT_SECRET: test
      YANDEX_CLIENT_ID: test
      YANDEX_CLIENT_SECRET: test
      OPENAI_API_KEY: test

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ./backend/requirements.txt

      # NOTE: the plagiarism_cpp C++ extension is NOT built here — the test
      # suite mocks it (see backend/conftest.py), so clang/llvm/cmake/boost and
      # the cmake build are unnecessary. psycopg2-binary needs no libpq-dev and
      # every other dep ships manylinux wheels, so no system packages are needed.
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      # Restore testmon's coverage DB so pytest runs only tests whose covered
      # code changed. Primary key always misses (run_id) so each run saves a
      # fresh DB; restore-keys pulls the most recent prior DB (incl. main's,
      # which a PR inherits). Cold cache => testmon safely runs the whole suite.
      - name: Restore testmon data
        uses: actions/cache@v4
        with:
          path: ./backend/.testmondata
          key: testmon-${{ runner.os }}-py3.11-${{ github.run_id }}
          restore-keys: |
            testmon-${{ runner.os }}-py3.11-

      - name: Run tests (only those affected by the change)
        run: pytest --ignore=tests/api_tests/yandex --testmon -q --tb=short

  frontend-build:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_URL: https://createmanager.duckdns.org/api
        run: npm run build

      - name: Check build output
        run: test -f dist/index.html

  all-checks-passed:
    needs: [backend-lint, backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check if all jobs passed
        run: |
          if [[ "${{ needs.backend-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.backend-test.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend-build.result }}" == "failure" ]]; then
            echo "Some checks failed"
            exit 1
          fi
          echo "All checks passed"
