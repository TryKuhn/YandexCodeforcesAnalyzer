name: CI Workflow

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  backend-lint:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ./backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ruff
        run: ruff check .

#      - name: Run mypy
#        run: mypy . --ignore-missing-imports --explicit-package-bases

  backend-test:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      POSTGRES_DB: test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432

      SECRET_KEY: test-secret-key

      CF_CLIENT_ID: test
      CF_CLIENT_SECRET: test
      YANDEX_CLIENT_ID: test
      YANDEX_CLIENT_SECRET: test
      OPENAI_API_KEY: test

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ./backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          cmake \
          clang-17 \
          llvm-17 \
          llvm-17-dev \
          libclang-17-dev \
          libboost-dev \
          pybind11-dev \
          build-essential \
          libpq-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pybind11

      - name: Build plagiarism extension
        run: |
          mkdir -p /tmp/plag-build
          cmake -S ./plagiarism -B /tmp/plag-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang-17 \
            -DCMAKE_CXX_COMPILER=clang++-17 \
            -DClang_DIR=/usr/lib/llvm-17/lib/cmake/clang \
            -DLLVM_DIR=/usr/lib/llvm-17/lib/cmake/llvm \
            -Dpybind11_DIR="$(python -m pybind11 --cmakedir)"
          cmake --build /tmp/plag-build --target plagiarism_cpp -j"$(nproc)"

          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          find /tmp/plag-build -name "plagiarism_cpp*.so" -exec cp {} "$SITE_PACKAGES" \;

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest --ignore=tests/api_tests/yandex -q --tb=short

  frontend-build:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_URL: https://createmanager.duckdns.org/api
        run: npm run build

      - name: Check build output
        run: test -f dist/index.html

  all-checks-passed:
    needs: [backend-lint, backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check if all jobs passed
        run: |
          if [[ "${{ needs.backend-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.backend-test.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend-build.result }}" == "failure" ]]; then
            echo "Some checks failed"
            exit 1
          fi
          echo "All checks passed"
