name: "CI Workflow"

on:
  pull_request:
    branches: [ main ]

env:
  CODEFORCES_TEST_KEY: ${{ secrets.CODEFORCES_TEST_KEY }}
  CODEFORCES_TEST_SECRET: ${{ secrets.CODEFORCES_TEST_SECRET }}
  CODEFORCES_HOST: ${{ secrets.CODEFORCES_HOST }}

  YANDEX_CLIENT_ID: ${{ secrets.YANDEX_CLIENT_ID }}
  YANDEX_CLIENT_SECRET: ${{ secrets.YANDEX_CLIENT_SECRET }}
  YANDEX_HOST: ${{ secrets.YANDEX_HOST }}
  YANDEX_TEST_OAUTH: ${{ secrets.YANDEX_TEST_OAUTH }}

  DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
  DATABASE_USER: ${{ secrets.DATABASE_USER }}
  DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}

  REDIRECT_URI: ${{ secrets.REDIRECT_URI }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: ./Dockerfile
          push: false
          tags: yandexcodeforcesanalyzer:latest

  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ruff
        run: ruff check .

      - name: Run mypy
        run: mypy . --ignore-missing-imports

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest backend/tests --cov=backend

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      matrix:
        language: ['python']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  all-checks-passed:
    needs: [build, lint, test, codeql]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check if all jobs passed
        run: |
          if [ "${{ needs.build.result }}" != "success" ] || [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.codeql.result }}" != "success" ]; then
            exit 1
          fi

