[mypy]

# Pre-existing SQLAlchemy variable-reuse pattern errors (x = await db.execute(...); x = x.scalars().first())
# in files that have not been refactored yet. Suppress per-module until those files are cleaned up.

[mypy-api.user.contests]
ignore_errors = True

[mypy-api.user.auth.profile]
ignore_errors = True

[mypy-api.user.gpt.services.session_store]
ignore_errors = True

[mypy-api.user.codeforces.*]
ignore_errors = True

[mypy-api.user.yandex.auth.logout]
ignore_errors = True

[mypy-api.user.yandex.submissions.*]
ignore_errors = True

[mypy-api.user.yandex.standings.*]
ignore_errors = True

[mypy-api.user.polygon.auth.logout]
ignore_errors = True

[mypy-api.user.polygon.create_problem]
ignore_errors = True

[mypy-api.user.polygon.problem_info]
ignore_errors = True

[mypy-api.user.polygon.problem_script]
ignore_errors = True

[mypy-api.user.polygon.files.*]
ignore_errors = True

[mypy-api.user.polygon.settings.*]
ignore_errors = True

[mypy-api.user.polygon.commit.*]
ignore_errors = True
