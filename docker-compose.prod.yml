services:
  postgres:
    image: postgres:15
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/trykuhn/yandexcodeforcesanalyzer-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      PYTHONUNBUFFERED: 1
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    image: ghcr.io/trykuhn/yandexcodeforcesanalyzer-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend


volumes:
  postgres_data:
  caddy_data:
  caddy_config:
